# Deploy a web app to Azure Static Web Apps.
#
# Prerequisites:
# 1. Create an Azure Static Web App in the Azure portal.
# 2. Add the deployment token as a repository secret named AZURE_STATIC_WEB_APPS_API_TOKEN.
#    Docs: https://docs.microsoft.com/azure/static-web-apps/deployment-token-management
#
# Configuration:
# Update APP_LOCATION, API_LOCATION, and APP_ARTIFACT_LOCATION below to match your project.
# Docs: https://aka.ms/swaworkflowconfig
name: Deploy to Azure Static Web Apps

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: ["dev", "main"]

env:
  APP_LOCATION: "/"       # path to your client code
  API_LOCATION: "api"     # path to your API source (leave empty if none)
  APP_ARTIFACT_LOCATION: "build"  # path to your build output
  AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Build and Deploy
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          app_artifact_location: ${{ env.APP_ARTIFACT_LOCATION }}

  close_pull_request:
    name: Close Pull Request
    permissions:
      contents: none
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
